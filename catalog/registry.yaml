schema_version: 1

repository:
  name: gs-framework-aitools
  purpose: Shared monorepo for reusable MCP servers, skills, and AI
    tooling support files.
  owners:
    team: "AI Tools Team"

artifacts:
  - name: skills-server
    type: mcp-server
    path: mcp-servers/skills-server
    description: Indexes markdown skill files and exposes targeted retrieval tools over MCP so clients can fetch only relevant sections.
    plain_description: Helps an agent find the right skill instructions quickly instead of searching through everything by hand.
    tags:
      - platform
      - knowledge-management
      - skill-indexing
      - content-retrieval
    install_prompt: >-
      Install the MCP server "skills-server" globally from https://github.com/Aristocrat-Gaming/gs-framework-aitools/tree/main/mcp-servers/skills-server. Use that folder as the source, preserve its configuration files, and make it available in my global MCP server setup for future sessions.
    version: 1.0.0
    lifecycle: beta
    owner_team: "Oasis Core"
    primary_maintainer: "Anamika.Aggarwal@aristocrat.com"
    backup_maintainer: "Oasis Core"
    dependencies:
      internal: []
      external:
        - markdown-skill-files

  - name: tfs-mcp-server
    type: mcp-server
    path: mcp-servers/tfs-mcp-server
    description: Exposes read and write operations for on-premises TFS/Azure DevOps Server Git repositories and work items over MCP.
    plain_description: Lets an agent look up and update TFS code and work items without leaving the conversation.
    tags:
      - development
      - devops
      - tfs
      - work-item-management
    install_prompt: >-
      Install the MCP server "tfs-mcp-server" globally from https://github.com/Aristocrat-Gaming/gs-framework-aitools/tree/main/mcp-servers/tfs-mcp-server. Use that folder as the source, preserve its configuration files, and make it available in my global MCP server setup for future sessions.
    version: 1.0.0
    lifecycle: beta
    owner_team: "Oasis Core"
    primary_maintainer: "Mohit.Taneja@aristocrat.com"
    backup_maintainer: "Oasis Core"
    dependencies:
      internal: []
      external:
        - tfs-azure-devops-server-api

  - name: confluence-server
    type: mcp-server
    path: mcp-servers/confluence-server
    description: Exposes Confluence content lookup and retrieval operations over MCP.
    plain_description: Lets an agent read Confluence pages and documentation so it can answer questions with the team’s existing knowledge.
    tags:
      - documentation
      - knowledge-management
      - confluence
      - content-retrieval
    install_prompt: >-
      Install the MCP server "confluence-server" globally from https://github.com/Aristocrat-Gaming/gs-framework-aitools/tree/main/mcp-servers/confluence-server. Use that folder as the source, preserve its configuration files, and make it available in my global MCP server setup for future sessions.
    version: 1.0.0
    lifecycle: beta
    owner_team: "nVision Team"
    primary_maintainer: "vishakha.garg@aristocrat.com"
    backup_maintainer: "Vishakha Garg"
    dependencies:
      internal: []
      external:
        - confluence-cloud-rest-api

  - name: confluence-owner-search-server
    type: mcp-server
    path: mcp-servers/confluence-owner-search-server
    description: Searches Confluence content for ownership details and responsible teams over MCP.
    plain_description: Helps an agent find who owns a system, document, or area by searching team knowledge in Confluence.
    tags:
      - documentation
      - ownership
      - confluence
      - search
    install_prompt: >-
      Install the MCP server "confluence-owner-search-server" globally from https://github.com/Aristocrat-Gaming/gs-framework-aitools/tree/main/mcp-servers/confluence-owner-search-server. Use that folder as the source, preserve its configuration files, and make it available in my global MCP server setup for future sessions.
    version: 1.0.0
    lifecycle: beta
    owner_team: "nVision Team"
    primary_maintainer: "vishakha.garg@aristocrat.com"
    backup_maintainer: "Vishakha Garg"
    dependencies:
      internal: []
      external:
        - confluence-cloud-rest-api

  - name: pbi-mcp-server
    type: mcp-server
    path: mcp-servers/pbi-mcp-server
    description: Provides product backlog item lookup and related metadata retrieval over MCP.
    plain_description: Lets an agent pull backlog item details so it can understand requested work and the surrounding requirements.
    tags:
      - product-management
      - backlog
      - requirements
      - work-items
    install_prompt: >-
      Install the MCP server "pbi-mcp-server" globally from https://github.com/Aristocrat-Gaming/gs-framework-aitools/tree/main/mcp-servers/pbi-mcp-server. Use that folder as the source, preserve its configuration files, and make it available in my global MCP server setup for future sessions.
    version: 1.0.0
    lifecycle: beta
    owner_team: "nVision Team"
    primary_maintainer: "vishakha.garg@aristocrat.com"
    backup_maintainer: "Vishakha Garg"
    dependencies:
      internal: []
      external:
