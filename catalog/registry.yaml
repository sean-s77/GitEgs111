  - name: windows-search-mcp
    type: mcp-server
    path: mcp-servers/windows-search-mcp
    description: Searches approved Windows roots through the Windows Search index and falls back to ripgrep for symbol-aware content lookup.
    plain_description: Helps an agent search large Windows code and file trees quickly, including symbol-like content when the index is weak or missing.
    tags:
      - development
      - diagnostics
      - windows
      - search
    install_prompt: >-
      Install the MCP server "windows-search-mcp" globally from https://github.com/Aristocrat-Gaming/gs-framework-aitools/tree/main/mcp-servers/windows-search-mcp. Use that folder as the source, preserve its configuration files, and make it available in my global MCP server setup for future sessions. Prompt me for the paths covered by the Windows Search index to ensure the server can search the right locations.
    version: 1.1.0
    lifecycle: released
    owner_team: Level 4
    primary_maintainer: sean.sweitzer@aristocrat.com
    backup_maintainer: Rahul.Khare2@aristocrat.com
    dependencies:
      internal: []
      external:
        - "@modelcontextprotocol/sdk"
        - zod
        - windows-search-service

